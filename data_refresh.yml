name: Data refresh

on:
  schedule:
    # Financial data: 1st of every month at 01:30 UTC (7am IST)
    - cron: '30 1 1 * *'
    # News: every 3 days at 01:30 UTC
    - cron: '30 1 */3 * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - financials
          - news

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialise database tables
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -c "from database import init_db; init_db()"

      - name: Run financial update
        # Runs on 1st of month OR manual trigger with financials/both
        if: |
          github.event_name == 'schedule' && contains(github.event.schedule, '1 * *') ||
          github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'financials' || github.event.inputs.job == 'both')
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -c "from fetcher import run_financial_update; run_financial_update()"

      - name: Run news update
        # Runs every 3 days OR manual trigger with news/both
        if: |
          github.event_name == 'schedule' && contains(github.event.schedule, '*/3') ||
          github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'news' || github.event.inputs.job == 'both')
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -c "from fetcher import run_news_update; run_news_update()"

      - name: Report status
        if: always()
        run: echo "Job finished at $(date)"
