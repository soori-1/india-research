name: Data refresh

on:
  schedule:
    # Financial data: 1st of every month at 01:30 UTC (7am IST)
    - cron: '30 1 1 * *'
    # News only: every 3 days at 01:30 UTC
    - cron: '30 1 */3 * *'
  # Manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - financials
          - news

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: write   # needed to commit data files back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Run financial update
        if: |
          (github.event_name == 'schedule' && github.event.schedule == '30 1 1 * *') ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'financials' || github.event.inputs.job == 'both'))
        run: python fetcher.py financials

      - name: Run news update
        if: |
          (github.event_name == 'schedule' && github.event.schedule == '30 1 */3 * *') ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'news' || github.event.inputs.job == 'both'))
        run: python fetcher.py news

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto: data refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
